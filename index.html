<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Wayfarer — Travel Your Way</title>

  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link
    href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap"
    rel="stylesheet">

  <style>
    :root {
      --ink: #1c1610;
      --cream: #f8f3ec;
      --warm-white: #fdfaf6;
      --terra: #b85c38;
      --terra-light: #e8c4b2;
      --sage: #6b7c6a;
      --sage-light: #d4dcd3;
      --muted: #7a6f65;
      --border: rgba(28, 22, 16, 0.12);
    }

    *,
    *::before,
    *::after {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    html {
      scroll-behavior: smooth;
    }

    body {
      font-family: 'DM Sans', sans-serif;
      background: var(--warm-white);
      color: var(--ink);
      font-size: 16px;
      line-height: 1.6;
      overflow-x: hidden;
    }

    /* NAV */
    nav {
      position: fixed;
      top: 0;
      left: 0;
      right: 0;
      z-index: 100;
      padding: 20px 48px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: rgba(253, 250, 246, 0.88);
      backdrop-filter: blur(12px);
      border-bottom: 0.5px solid var(--border);
    }

    .logo {
      font-family: 'Cormorant Garamond', serif;
      font-size: 22px;
      font-weight: 600;
      color: var(--ink);
      text-decoration: none;
    }

    .logo span {
      color: var(--terra);
    }

    nav ul {
      list-style: none;
      display: flex;
      gap: 32px;
      align-items: center;
    }

    nav a {
      text-decoration: none;
      font-size: 14px;
      color: var(--muted);
    }

    nav a:hover {
      color: var(--ink);
    }

    .nav-cta {
      background: var(--ink);
      color: var(--warm-white);
      padding: 9px 20px;
      border-radius: 100px;
    }

    .nav-cta:hover {
      background: var(--terra);
    }
  </style>
</head>

<body>

  <!-- NAV -->
  <nav>
    <a href="#" class="logo">Way<span>farer</span></a>
    <ul>
      <li><a href="#how">How it works</a></li>
      <li><a href="#features">Features</a></li>
      <li><a href="#pricing">Pricing</a></li>
      <li><a class="nav-cta">Join waitlist</a></li>
    </ul>
  </nav>

</body>

</html>
