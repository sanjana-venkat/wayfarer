<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Wayfarer — Travel Your Way</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,600;1,300;1,400&family=DM+Sans:wght@300;400;500&display=swap" rel="stylesheet">
<link rel="stylesheet" href="/styles/tokens.css">
<link rel="stylesheet" href="/styles/components.css">
<link rel="stylesheet" href="/styles/layout.css">

<style>
  html { scroll-behavior: smooth; }

  body {
    font-family: 'DM Sans', sans-serif;
    background: var(--warm-white);
    color: var(--ink);
    font-size: 16px;
    line-height: 1.6;
    overflow-x: hidden;
  }

  /* NAV */
  nav {
    position: fixed; top: 0; left: 0; right: 0; z-index: 100;
    padding: 20px 48px;
    display: flex; align-items: center; justify-content: space-between;
    background: rgba(253, 250, 246, 0.88);
    backdrop-filter: blur(12px);
    border-bottom: 0.5px solid var(--border);
  }
  .logo {
    font-family: 'Cormorant Garamond', serif;
    font-size: 22px; font-weight: 600; letter-spacing: 0.04em;
    color: var(--ink); text-decoration: none;
  }
  .logo span { color: var(--terra); }
  nav ul { list-style: none; display: flex; gap: 32px; align-items: center; }
  nav a { text-decoration: none; font-size: 14px; font-weight: 400; color: var(--muted); transition: color 0.2s; }
  nav a:hover { color: var(--ink); }
  .nav-cta {
    background: var(--ink); color: var(--warm-white) !important;
    padding: 9px 20px; border-radius: 100px;
    font-size: 13px; font-weight: 500;
    transition: background 0.2s !important;
  }
  .nav-cta:hover { background: var(--terra) !important; }

</style>

</head>
